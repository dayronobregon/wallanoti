services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: wallanoti-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Database=wallanoti_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: ${RABBITMQ_USER:-admin}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-admin}
      RabbitMq__VirtualHost: /
      RabbitMq__Port: 5672
      Jwt__Secret: ${JWT_SECRET:-CHANGE_ME_USE_ENV_OR_USER_SECRETS_MIN_32_CHARS}
      Jwt__Issuer: ${JWT_ISSUER:-wallanoti}
      Jwt__Audience: ${JWT_AUDIENCE:-wallanoti-users}
      TelegramBotToken: ${TELEGRAM_BOT_TOKEN:-YOUR_TELEGRAM_BOT_TOKEN}
      Notifications__OwnerChatId: ${TELEGRAM_OWNER_CHAT_ID:-YOUR_TELEGRAM_OWNER_CHAT_ID}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wallanoti

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SIGNALR_URL: ${VITE_SIGNALR_URL:-}
        VITE_TELEGRAM_BOT: ${VITE_TELEGRAM_BOT:-}
    container_name: wallanoti-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - wallanoti
      
networks:
  wallanoti:
    driver: bridge
