services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    container_name: wallanoti-postgres
    hostname: postgres.${HOSTNAME:-localhost}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: wallanoti_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d wallanoti_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wallanoti

  rabbitmq:
    image: rabbitmq:management
    container_name: wallanoti-rabbitmq
    hostname: rabbitmq.${HOSTNAME:-localhost}
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wallanoti

  redis:
    image: redis:7-alpine
    container_name: wallanoti-redis
    hostname: redis.${HOSTNAME:-localhost}
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wallanoti

networks:
  wallanoti:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
