name: ui-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20 (coincide con package.json engines)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps (npm ci)
        run: npm ci

      # Opcional: generar cliente API si cambiaste swagger.json
      # - run: npm run generate:api

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: error
