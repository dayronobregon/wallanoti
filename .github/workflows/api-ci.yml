name: api-ci

on:
  push:
    branches:
      - main
      - develop
      - feature/*
      - bugfix/*
      - hotfix/*
      - release/*
  pull_request:
    branches:
      - main
      - develop
      - feature/*
      - bugfix/*
      - hotfix/*
      - release/*

jobs:
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detectar cambios en backend
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'

      - name: Setup .NET
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: dotnet restore

      - name: Build
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: dotnet build --no-restore

      - name: Test
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: dotnet test tests/tests.csproj --no-build --verbosity normal

      - name: Omitir backend (sin cambios)
        if: steps.changes.outputs.backend != 'true'
        run: echo "No hay cambios en backend; check marcado como OK."
