name: api-ci

on:
  push:
    branches:
      - main
      - develop
      - feature/*
      - bugfix/*
      - hotfix/*
      - release/*
    paths:
      - 'backend/**'
      - 'docker/**'
      - '!**' # evita que main dispare si no coincide con paths
  pull_request:
    branches:
      - main
      - develop
      - feature/*
      - bugfix/*
      - hotfix/*
      - release/*
    paths:
      - 'backend/**'
      - 'docker/**'
      - '!**'

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      working-directory: backend
      run: dotnet restore

    - name: Build
      working-directory: backend
      run: dotnet build --no-restore

    - name: Test
      working-directory: backend
      run: dotnet test tests/tests.csproj --no-build --verbosity normal
